name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gut-tests:
    name: GUT Tests (Godot 4 headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GUT v9.3.0
        run: |
          # GUT ships source-only — use the archive URL (no release assets exist)
          wget -q https://github.com/bitwes/Gut/archive/refs/tags/v9.3.0.zip -O gut_9.3.0.zip
          unzip -q gut_9.3.0.zip
          # Archive extracts to Gut-9.3.0/addons/gut/ — move to repo root
          mkdir -p addons
          mv Gut-9.3.0/addons/gut addons/gut
          rm -rf Gut-9.3.0 gut_9.3.0.zip

      - name: Download Godot 4 headless
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip
          unzip -q Godot_v4.4-stable_linux.x86_64.zip
          chmod +x Godot_v4.4-stable_linux.x86_64
          sudo mv Godot_v4.4-stable_linux.x86_64 /usr/local/bin/godot

      - name: Import project (generate .godot cache)
        run: |
          godot --headless --import --quit 2>&1 | tail -5 || true
        timeout-minutes: 2

      - name: Run GUT tests
        run: |
          godot --headless \
            --script addons/gut/gut_cmdln.gd \
            -gdir=res://tests/ \
            -gprefix=test_ \
            -gsuffix=.gd \
            -gexit \
            2>&1
        timeout-minutes: 5
